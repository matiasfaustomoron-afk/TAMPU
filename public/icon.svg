<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!--
    TAMPU — Tambo del Inca
    Motivo escalonado andino (chacana) en posición de "casa que sube":
    tres niveles ascendentes en lana de llama sobre terracota Quebradeña.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C75B2F"/>
      <stop offset="1" stop-color="#A33E16"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>

  <g fill="#F5EFE0">
    <!-- Nivel base -->
    <rect x="36"  y="120" width="120" height="24" rx="3"/>
    <!-- Nivel medio -->
    <rect x="54"  y="90"  width="84"  height="24" rx="3"/>
    <!-- Nivel superior -->
    <rect x="72"  y="60"  width="48"  height="24" rx="3"/>
    <!-- Remate del tambo -->
    <rect x="88"  y="42"  width="16"  height="12" rx="2"/>
  </g>
</svg>
